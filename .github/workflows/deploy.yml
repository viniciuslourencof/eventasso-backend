
  name: Push-to-EC2
  on:
    push:
      branches:
        - main
  jobs:
    deploy:
      name: Deploy to EC2
      runs-on: ubuntu-latest
      steps:
        - name: Checkout the files
          uses: actions/checkout@v3

        - name: Copy files with SSH
          uses: easingthemes/ssh-deploy@main
          env:
            SSH_PRIVATE_KEY: ${{secrets.EC2_SSH_KEY}}
            ARGS: "-rltgoDzvO --delete"
            SOURCE: "./"
            REMOTE_HOST: "ec2-18-230-69-133.sa-east-1.compute.amazonaws.com"
            REMOTE_USER: "ubuntu"
            TARGET: "/home/ubuntu/eventasso-backend"

